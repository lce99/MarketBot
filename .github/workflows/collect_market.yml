name: Collect Market Data

on:
  schedule:
    # 한국 마감 (15:30 KST = 06:30 UTC)
    - cron: '0 7 * * 1-5'
    # 도쿄 마감 (15:00 JST = 06:00 UTC)
    - cron: '30 6 * * 1-5'
    # 상하이 마감 (15:00 CST = 07:00 UTC)
    - cron: '30 7 * * 1-5'
    # 베트남/홍콩 마감 (~08:00 UTC)
    - cron: '30 8 * * 1-5'
    # 인도 마감 (15:30 IST = 10:00 UTC)
    - cron: '0 10 * * 1-5'
    # 독일 마감 (17:30 CET = 16:30 UTC)
    - cron: '0 17 * * 1-5'
    # 미국 마감 (16:00 ET = 21:00 UTC)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:
    inputs:
      market:
        description: '시장 코드 (KR, US, CN, JP, VN, IN, DE, ALL)'
        required: true
        default: 'KR'
      date:
        description: '수집 기준일 (YYYY-MM-DD, 비우면 UTC 오늘)'
        required: false
        default: ''
      mode:
        description: 'VN 수집 모드'
        required: true
        type: choice
        default: 'auto'
        options:
          - auto
          - full
          - incremental
          - seed
      max_tickers:
        description: 'VN 1회 최대 종목 수 (비우면 기본값)'
        required: false
        default: ''
      resume_from_checkpoint:
        description: 'VN 저장 checkpoint에서 재개'
        required: true
        type: boolean
        default: false

# data/marketbot.db를 커밋하는 워크플로끼리 동시 실행되면 rebase 충돌로
# 수집 데이터가 유실되므로 같은 그룹으로 직렬화한다.
concurrency:
  group: marketbot-db-commit
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine market from schedule
        id: market
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            market="${{ github.event.inputs.market }}"
          else
            case "${{ github.event.schedule }}" in
              '30 6 * * 1-5') market="JP" ;;
              '0 7 * * 1-5') market="KR" ;;
              '30 7 * * 1-5') market="CN" ;;
              '30 8 * * 1-5') market="VN" ;;
              '0 10 * * 1-5') market="IN" ;;
              '0 17 * * 1-5') market="DE" ;;
              '30 21 * * 1-5') market="US" ;;
              *)
                echo "Unsupported schedule: ${{ github.event.schedule }}" >&2
                exit 1
                ;;
            esac
          fi
          echo "market=${market^^}" >> $GITHUB_OUTPUT

      - name: Run collection preflight
        id: preflight
        continue-on-error: true
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          COLLECTION_DATE: ${{ github.event.inputs.date }}
        run: |
          args=(--market "${{ steps.market.outputs.market }}" --preflight-only)
          if [ -n "$COLLECTION_DATE" ]; then
            args+=(--date "$COLLECTION_DATE")
          fi
          python -m scripts.collect "${args[@]}"

      - name: Collect market data
        id: collection
        if: steps.preflight.outcome == 'success'
        continue-on-error: true
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
          COLLECTION_DATE: ${{ github.event.inputs.date }}
          COLLECTION_MODE: ${{ github.event.inputs.mode }}
          COLLECTION_MAX_TICKERS: ${{ github.event.inputs.max_tickers }}
          COLLECTION_RESUME: ${{ github.event.inputs.resume_from_checkpoint }}
        run: |
          args=(--market "${{ steps.market.outputs.market }}")
          if [ -n "$COLLECTION_DATE" ]; then
            args+=(--date "$COLLECTION_DATE")
          fi
          if [ -n "$COLLECTION_MODE" ] && [ "$COLLECTION_MODE" != "auto" ]; then
            args+=(--mode "$COLLECTION_MODE")
          fi
          if [ -n "$COLLECTION_MAX_TICKERS" ]; then
            args+=(--max-tickers "$COLLECTION_MAX_TICKERS")
          fi
          if [ "$COLLECTION_RESUME" = "true" ]; then
            args+=(--resume-from-checkpoint)
          fi
          python -m scripts.collect "${args[@]}"

      - name: Checkpoint database
        if: always()
        run: python -m scripts.checkpoint_db

      - name: Upload raw database artifact
        if: steps.collection.outcome == 'success' && steps.market.outputs.market != 'BENCHMARK'
        uses: actions/upload-artifact@v4
        with:
          name: marketbot-raw-db-${{ github.run_id }}-${{ steps.market.outputs.market }}
          path: data/marketbot_raw.db
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit summary database
        if: always()
        run: |
          git config user.name "MarketBot"
          git config user.email "marketbot@github.com"
          git add data/marketbot.db
          git diff --cached --quiet || git commit -m "data: ${{ steps.market.outputs.market }} $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Collect benchmarks
        id: benchmark
        if: steps.collection.outcome == 'success' && (steps.market.outputs.market == 'US' || github.event.inputs.market == 'ALL')
        continue-on-error: true
        run: python -m scripts.collect --market BENCHMARK

      - name: Checkpoint benchmark database
        if: steps.benchmark.outcome == 'success'
        run: python -m scripts.checkpoint_db

      - name: Commit benchmark database
        if: steps.benchmark.outcome == 'success'
        run: |
          git config user.name "MarketBot"
          git config user.email "marketbot@github.com"
          git add data/marketbot.db
          git diff --cached --quiet || git commit -m "data: BENCHMARK $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push

      - name: Note benchmark failure
        if: steps.benchmark.outcome == 'failure'
        run: echo "Benchmark collection failed after primary market data commit."

      - name: Preserve collection failure status
        if: always() && (steps.preflight.outcome == 'failure' || steps.collection.outcome == 'failure')
        run: |
          echo "Collection failed; diagnostics and checkpoints were committed above." >&2
          exit 1
