name: Send Daily Report

on:
  schedule:
    # 미국 마감 1시간 후 (UTC 22:00) 종합 리포트 발송
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare report data
        run: python -m scripts.report --prepare-only

      - name: Checkpoint database
        run: python -m scripts.checkpoint_db

      - name: Commit summary report data
        run: |
          git config user.name "MarketBot"
          git config user.email "marketbot@github.com"
          git add data/marketbot.db
          git diff --cached --quiet || git commit -m "report-data: $(date -u +%Y-%m-%d)"
          git push

      - name: Send daily report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m scripts.report --skip-analyze
